<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIO 战术终端 [全中文重构版]</title>
    <style>
        :root {
            --primary: #00ff9d;
            --danger: #ed1c24;
            --warning: #eebb00;
            --bg-dark: #050505;
            --bg-panel: #111111;
            --border: #333333;
            --text-main: #d0d0d0;
            --cyan: #66d9ef;
            --green: #a6e22e;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; /* 换成对中文友好的字体 */
            background-color: transparent;
            color: var(--text-main);
            margin: 0;
            padding: 8px;
            overflow-x: hidden;
            user-select: none;
        }

        .terminal-container {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            background: rgba(5, 5, 5, 0.95);
            border: 1px solid var(--border);
            border-top: 3px solid var(--primary); /* 顶部加粗亮边 */
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.05);
            position: relative;
        }

        /* 赛博网格背景 */
        .terminal-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background-image:
                linear-gradient(rgba(0, 255, 157, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 157, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
            pointer-events: none;
        }

        .header {
            background: linear-gradient(90deg, #1a1a1a 0%, #000 100%);
            padding: 8px 15px;
            border-bottom: 1px dashed var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sys-title {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--primary);
            text-shadow: 0 0 8px rgba(0,255,157,0.4);
            letter-spacing: 2px;
        }

        .sys-status { color: #555; font-size: 0.8em; font-family: monospace; }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid var(--border);
        }

        .panel-box { padding: 15px; background: rgba(17, 17, 17, 0.7); }
        .panel-left { border-right: 1px dashed #222; }

        .group-title {
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .group-title::before {
            content: '■';
            margin-right: 8px;
            font-size: 0.8em;
        }

        .text-cyan { color: var(--cyan); }
        .text-cyan::before { color: var(--cyan); }

        .text-green { color: var(--green); }
        .text-green::before { color: var(--green); }

        .stat-grid {
            display: grid;
            grid-template-columns: 90px 1fr; /* 调整中文标签宽度 */
            gap: 10px 15px;
            font-size: 0.85em;
        }

        .stat-label {
            color: #888;
            text-align: right;
            font-family: 'Consolas', monospace; /* 标签用等宽字体显得整齐 */
        }

        .stat-value {
            color: #fff;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 2px;
            border-left: 2px solid #333;
        }

        .stat-note {
            color: #666;
            font-size: 0.85em;
            font-weight: normal;
            margin-left:8px;
        }

        /* OOB Area */
        .oob-box {
            padding: 15px;
            background: linear-gradient(0deg, #050505 0%, #0a0a0c 100%);
        }

        .oob-title {
            color: var(--warning);
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .oob-title::before {
            content: '▶';
            margin-right: 8px;
            font-size: 0.8em;
        }

        .oob-data {
            font-size: 0.8em;
            color: #aaa;
            line-height: 1.8;
            white-space: pre-wrap;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            border: 1px dashed #222;
            border-left: 3px solid var(--warning);
            border-radius: 2px;
        }

        .alert-red {
            color: var(--danger) !important;
            border-left-color: var(--danger) !important;
            animation: warningPulse 1.5s infinite;
        }

        @keyframes warningPulse {
            0% { background: rgba(237,28,36,0.1); }
            50% { background: rgba(237,28,36,0.3); }
            100% { background: rgba(237,28,36,0.1); }
        }

    </style>
</head>
<body>

<div class="terminal-container">
    <div class="header">
        <div class="sys-title">万世·历史模拟终端 v5.3</div>
        <div class="sys-status">SYS.SYNC_OK</div>
    </div>

    <div class="dashboard">
        <div class="panel-box panel-left">
            <div class="group-title text-cyan">核心态势指标</div>
            <div class="stat-grid">
                <div class="stat-label">正统性_</div> <div class="stat-value"><span id="v-leg">--%</span> <span class="stat-note" id="n-leg"></span></div>
                <div class="stat-label">组织度_</div> <div class="stat-value"><span id="v-org">--%</span> <span class="stat-note" id="n-org"></span></div>
                <div class="stat-label">侦查视野_</div> <div class="stat-value"><span id="v-recon">--</span> <span class="stat-note" id="n-recon"></span></div>
                <div class="stat-label">精神压力_</div> <div class="stat-value" id="box-san"><span id="v-san" style="color:inherit">--</span> <span class="stat-note" id="n-san" style="color:inherit"></span></div>
            </div>
        </div>

        <div class="panel-box">
            <div class="group-title text-green">后勤物资网络</div>
            <div class="stat-grid">
                <div class="stat-label">库房资金_</div> <div class="stat-value"><span id="v-money">--</span> <span class="stat-note" id="n-money"></span></div>
                <div class="stat-label">粮草贮备_</div> <div class="stat-value"><span id="v-food">--</span> <span class="stat-note" id="n-food"></span></div>
                <div class="stat-label">军械弹药_</div> <div class="stat-value" id="box-ammo"><span id="v-ammo" style="color:inherit">--</span> <span class="stat-note" id="n-ammo" style="color:inherit"></span></div>
                <div class="stat-label">医疗资源_</div> <div class="stat-value"><span id="v-med">--</span> <span class="stat-note" id="n-med"></span></div>
            </div>
        </div>
    </div>

    <div class="oob-box">
        <div class="oob-title">战场指挥链与态势简报</div>
        <div class="oob-data" id="v-oob">系统未接收到战术数据流。</div>
    </div>
</div>

<script>
    function parseParams() {
        const u = new URLSearchParams(window.location.search);
        const clean = (val) => val ? val.replace(/%/g, '') : '--';
        const raw = (val) => val || '';

        const bind = (idVal, idNote, valKey, noteKey, suffix = '') => {
            let v = clean(u.get(valKey));
            let elV = document.getElementById(idVal);
            if(v !== '--') { elV.innerText = v + suffix; }

            let n = raw(u.get(noteKey));
            if(n) { document.getElementById(idNote).innerText = `[${n}]`; }
            return { val: v, note: n };
        };

        bind('v-leg', 'n-leg', 'leg', 'nl', '%');
        bind('v-org', 'n-org', 'org', 'no', '%');
        bind('v-recon', 'n-recon', 'recon', 'nr');

        // SAN值红色警告判定 (直接改变外部的div框)
        let sanData = bind('v-san', 'n-san', 'san', 'ns');
        if(parseInt(sanData.val) > 70 || sanData.note.includes('焦虑') || sanData.note.includes('危')) {
            document.getElementById('box-san').classList.add('alert-red');
            document.getElementById('v-san').innerText += ' ⚠';
        }

        bind('v-money', 'n-money', 'money', 'nm');
        bind('v-food', 'n-food', 'food', 'nf');

        // 弹药短缺红色警告
        let ammoData = bind('v-ammo', 'n-ammo', 'ammo', 'na');
        if(ammoData.note.includes('缺') || ammoData.note.includes('尽')) {
            document.getElementById('box-ammo').classList.add('alert-red');
            document.getElementById('v-ammo').innerText += ' ⚠';
        }

        bind('v-med', 'n-med', 'med', 'nd');

        // OOB 处理
        let oobText = u.get('oob');
        if(oobText) {
            oobText = oobText.replace(/\|n\|/g, '\n');
            document.getElementById('v-oob').innerText = oobText;
        }
    }

    window.onload = parseParams;
</script>

</body>
</html>
