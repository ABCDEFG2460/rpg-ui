<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIO ENGINE - 调试终端</title>
    <style>
        body { background: #000; color: #00ff9d; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        .err { color: #ed1c24; }
    </style>
</head>
<body>

<div class="box">
    <h3>🔗 URL 分析器 (看看浏览器到底收到了啥)</h3>
    <div id="debug-url" style="word-break: break-all; color: #aaa;"></div>
</div>

<div class="box">
    <h3>🛠️ 参数拆解</h3>
    <ul id="debug-params"></ul>
</div>

<div class="box">
    <h3>📺 渲染结果模拟</h3>
    <p>Leg: <span id="r-leg">--</span></p>
    <p>Org: <span id="r-org">--</span></p>
    <p>OOB: <span id="r-oob">--</span></p>
</div>

<script>
    window.onload = function() {
        try {
            // 1. 打印完整的原始URL
            document.getElementById('debug-url').innerText = window.location.href;

            // 2. 解析参数
            const params = new URLSearchParams(window.location.search);
            const ul = document.getElementById('debug-params');

            let count = 0;
            params.forEach((value, key) => {
                let li = document.createElement('li');
                li.innerText = `Key [${key}] = Value [${value}]`;
                ul.appendChild(li);
                count++;
            });

            if(count === 0) {
                let li = document.createElement('li');
                li.className = 'err';
                li.innerText = "❌ 警告：没有检测到任何参数！可能是符号被截断或网址粘贴错误。";
                ul.appendChild(li);
            }

            // 3. 尝试渲染核心项
            document.getElementById('r-leg').innerText = params.get('leg') || '未收到数值';
            document.getElementById('r-org').innerText = params.get('org') || '未收到数值';
            document.getElementById('r-oob').innerText = params.get('oob') || '未收到数值';

        } catch (e) {
            document.getElementById('debug-url').innerText = "发生致命错误：" + e.message;
        }
    };
</script>

</body>
</html>
